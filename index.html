<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="shortcut icon"
            href="/assets/favicon.ico"
            type="image/x-icon" />
        <link rel="icon" href="/assets/favicon.ico" type="image/x-icon" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Jason Paciorek is a Full-Stack Developer building production web and mobile applications with React, React Native, Node.js, MongoDB, Docker, Stripe, and OpenAPI-backed contracts." />
        <title>Jason Paciorek | Full-Stack Developer</title>
        <script>
            (() => {
                const storedTheme = localStorage.getItem("theme");
                const systemPrefersDark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                const theme =
                    storedTheme ?? (systemPrefersDark ? "dark" : "light");
                document.documentElement.dataset.theme = theme;
            })();
        </script>
        <script>
            (() => {
                const redirect = window.location.search.match(/^[?]\/([^&]+)/);

                if (!redirect) {
                    return;
                }

                const route = redirect[1]
                    .replace(/~and~/g, "&")
                    .replace(/%23/g, "#");
                const nextUrl = `${window.location.origin}/${route}${window.location.hash}`;

                window.history.replaceState(null, "", nextUrl);
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
